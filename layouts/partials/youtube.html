{{- $id := .id -}}
{{- $title := .title | default "Video" -}}
<button class="yt" type="button"
        data-yt="{{ $id }}"
        aria-label="Play video: {{ $title }}"
        style="background-image:url('https://i.ytimg.com/vi/{{ $id }}/maxresdefault.jpg')">
  <span class="yt__play" aria-hidden="true">
    <svg viewBox="0 0 68 48"><path d="M66.5 7.7a8.6 8.6 0 0 0-6-6C55.2 0 34 0 34 0S12.8 0 7.5 1.7a8.6 8.6 0 0 0-6 6A90 90 0 0 0 0 24a90 90 0 0 0 1.5 16.3 8.6 8.6 0 0 0 6 6C12.8 48 34 48 34 48s21.2 0 26.5-1.7a8.6 8.6 0 0 0 6-6A90 90 0 0 0 68 24a90 90 0 0 0-1.5-16.3z" fill="#f00"/><path d="M45 24 27 14v20z" fill="#fff"/></svg>
  </span>
</button>
